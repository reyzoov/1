<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: #12121a;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .login-title {
            font-size: 1.8rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #6c63ff, #e942f5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .login-subtitle {
            text-align: center;
            color: #606070;
            margin-bottom: 32px;
        }
        .form-group {
            margin-bottom: 20px;
            position: relative;
        }
        input {
            width: 100%;
            padding: 16px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #6c63ff;
            box-shadow: 0 0 20px rgba(108,99,255,0.3);
        }
        .btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #6c63ff, #e942f5);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(108,99,255,0.4);
        }
        .error {
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.3);
            color: #ef4444;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 20px;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #606070;
            text-decoration: none;
            transition: color 0.3s;
        }
        .back-link:hover { color: #6c63ff; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1 class="login-title">🔐 Admin Panel</h1>
        <p class="login-subtitle">Введите пароль для доступа</p>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form method="POST">
            <div class="form-group">
                <input type="password" name="password" placeholder="Пароль" required autofocus>
            </div>
            <button type="submit" class="btn">Войти</button>
        </form>

        <a href="/" class="back-link">← Вернуться на сайт</a>
    </div>
</body>
</html>
