<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
</head>
<body>
    <nav class="admin-nav">
        <div class="nav-brand">⚙️ Admin Panel</div>
        <div class="nav-links">
            <a href="/" target="_blank" class="nav-link">👁 Посмотреть сайт</a>
            <a href="/admin/logout" class="nav-link logout">🚪 Выйти</a>
        </div>
    </nav>

    <div class="admin-container">
        <aside class="admin-sidebar">
            <button class="tab-btn active" data-tab="personal">👤 Личные данные</button>
            <button class="tab-btn" data-tab="skills">🛠 Навыки</button>
            <button class="tab-btn" data-tab="projects">📁 Проекты</button>
            <button class="tab-btn" data-tab="experience">💼 Опыт</button>
            <button class="tab-btn" data-tab="stats">📊 Статистика</button>
        </aside>

        <main class="admin-content">
            <!-- Personal Info Tab -->
            <div class="tab-panel active" id="tab-personal">
                <h2 class="panel-title">Личные данные</h2>
                <form id="personalForm" class="admin-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Имя</label>
                            <input type="text" name="name" value="{{ data.personal.name }}">
                        </div>
                        <div class="form-group">
                            <label>Должность</label>
                            <input type="text" name="title" value="{{ data.personal.title }}">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>О себе</label>
                        <textarea name="bio" rows="3">{{ data.personal.bio }}</textarea>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" name="email" value="{{ data.personal.email }}">
                        </div>
                        <div class="form-group">
                            <label>Telegram</label>
                            <input type="text" name="telegram" value="{{ data.personal.telegram }}">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>GitHub URL</label>
                            <input type="url" name="github" value="{{ data.personal.github }}">
                        </div>
                        <div class="form-group">
                            <label>Адрес</label>
                            <input type="text" name="location" value="{{ data.personal.location }}">
                        </div>
                    </div>
                    <button type="submit" class="btn-save">💾 Сохранить</button>
                </form>
            </div>

            <!-- Skills Tab -->
            <div class="tab-panel" id="tab-skills">
                <h2 class="panel-title">Навыки</h2>
                <div id="skillsList" class="items-list">
                    {% for skill in data.skills %}
                    <div class="item-card skill-item" data-index="{{ loop.index0 }}">
                        <div class="item-header">
                            <span class="item-icon">{{ skill.icon }}</span>
                            <input type="text" class="item-name" value="{{ skill.name }}">
                            <button class="btn-remove" onclick="removeSkill({{ loop.index0 }})">✕</button>
                        </div>
                        <div class="item-fields">
                            <div class="form-group">
                                <label>Уровень (0-100)</label>
                                <input type="number" class="skill-level" value="{{ skill.level }}" min="0" max="100">
                            </div>
                            <div class="form-group">
                                <label>Категория</label>
                                <select class="skill-category">
                                    <option value="frontend" {% if skill.category == 'frontend' %}selected{% endif %}>Frontend</option>
                                    <option value="backend" {% if skill.category == 'backend' %}selected{% endif %}>Backend</option>
                                    <option value="database" {% if skill.category == 'database' %}selected{% endif %}>Database</option>
                                    <option value="devops" {% if skill.category == 'devops' %}selected{% endif %}>DevOps</option>
                                    <option value="tools" {% if skill.category == 'tools' %}selected{% endif %}>Tools</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Иконка (эмодзи)</label>
                                <input type="text" class="skill-icon" value="{{ skill.icon }}">
                            </div>
                        </div>
                    </div>
                    {% endfor %}
                </div>
                <button class="btn-add" onclick="addSkill()">+ Добавить навык</button>
                <button type="button" class="btn-save" onclick="saveSkills()">💾 Сохранить все навыки</button>
            </div>

            <!-- Projects Tab -->
            <div class="tab-panel" id="tab-projects">
                <h2 class="panel-title">Проекты</h2>
                <div id="projectsList" class="items-list">
                    {% for project in data.projects %}
                    <div class="item-card project-item" data-index="{{ loop.index0 }}">
                        <div class="item-header">
                            <span class="item-number">#{{ project.id }}</span>
                            <input type="text" class="project-title" value="{{ project.title }}">
                            <button class="btn-remove" onclick="removeProject({{ loop.index0 }})">✕</button>
                        </div>
                        <div class="item-fields">
                            <div class="form-group">
                                <label>Описание</label>
                                <textarea class="project-desc" rows="2">{{ project.description }}</textarea>
                            </div>
                            <div class="form-row">
                                <div class="form-group">
                                    <label>Технологии (через запятую)</label>
                                    <input type="text" class="project-tech" value="{{ project.tech|join(', ') }}">
                                </div>
                                <div class="form-group">
                                    <label>Фичи (через запятую)</label>
                                    <input type="text" class="project-features" value="{{ project.features|join(', ') }}">
                                </div>
                            </div>
                            <div class="form-row">
                                <div class="form-group">
                                    <label>Demo URL</label>
                                    <input type="text" class="project-demo" value="{{ project.demo_url }}">
                                </div>
                                <div class="form-group">
                                    <label>GitHub URL</label>
                                    <input type="text" class="project-github" value="{{ project.github_url }}">
                                </div>
                            </div>
                        </div>
                    </div>
                    {% endfor %}
                </div>
                <button class="btn-add" onclick="addProject()">+ Добавить проект</button>
                <button type="button" class="btn-save" onclick="saveProjects()">💾 Сохранить все проекты</button>
            </div>

            <!-- Experience Tab -->
            <div class="tab-panel" id="tab-experience">
                <h2 class="panel-title">Опыт работы</h2>
                <div id="experienceList" class="items-list">
                    {% for exp in data.experience %}
                    <div class="item-card exp-item" data-index="{{ loop.index0 }}">
                        <div class="item-header">
                            <input type="text" class="exp-position" value="{{ exp.position }}">
                            <button class="btn-remove" onclick="removeExperience({{ loop.index0 }})">✕</button>
                        </div>
                        <div class="item-fields">
                            <div class="form-row">
                                <div class="form-group">
                                    <label>Компания</label>
                                    <input type="text" class="exp-company" value="{{ exp.company }}">
                                </div>
                                <div class="form-group">
                                    <label>Период</label>
                                    <input type="text" class="exp-period" value="{{ exp.period }}">
                                </div>
                            </div>
                            <div class="form-group">
                                <label>Описание</label>
                                <textarea class="exp-desc" rows="2">{{ exp.description }}</textarea>
                            </div>
                        </div>
                    </div>
                    {% endfor %}
                </div>
                <button class="btn-add" onclick="addExperience()">+ Добавить опыт</button>
                <button type="button" class="btn-save" onclick="saveExperience()">💾 Сохранить опыт</button>
            </div>

            <!-- Stats Tab -->
            <div class="tab-panel" id="tab-stats">
                <h2 class="panel-title">Статистика</h2>
                <form id="statsForm" class="admin-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Проектов выполнено</label>
                            <input type="number" name="projects_completed" value="{{ data.stats.projects_completed }}">
                        </div>
                        <div class="form-group">
                            <label>Лет опыта</label>
                            <input type="number" name="years_experience" value="{{ data.stats.years_experience }}">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Довольных клиентов</label>
                            <input type="number" name="happy_clients" value="{{ data.stats.happy_clients }}">
                        </div>
                        <div class="form-group">
                            <label>Коммитов</label>
                            <input type="number" name="code_commits" value="{{ data.stats.code_commits }}">
                        </div>
                    </div>
                    <button type="submit" class="btn-save">💾 Сохранить</button>
                </form>
            </div>
        </main>
    </div>

    <div class="notification" id="notification">
        <span class="notification-text"></span>
    </div>

    <script>
        // Tab switching
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
            });
        });

        // Notification
        function showNotification(msg, type = 'success') {
            const n = document.getElementById('notification');
            n.querySelector('.notification-text').textContent = msg;
            n.style.background = type === 'success' ? '#22c55e' : '#ef4444';
            n.classList.add('show');
            setTimeout(() => n.classList.remove('show'), 3000);
        }

        // Personal form
        document.getElementById('personalForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = Object.fromEntries(new FormData(e.target));
            const res = await fetch('/admin/save/personal', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(formData)
            });
            const data = await res.json();
            showNotification(data.message || 'Сохранено');
        });

        // Stats form
        document.getElementById('statsForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = Object.fromEntries(new FormData(e.target));
            Object.keys(formData).forEach(k => formData[k] = parseInt(formData[k]) || 0);
            const res = await fetch('/admin/save/stats', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(formData)
            });
            showNotification('Статистика сохранена');
        });

        // Skills
        function getSkillsData() {
            const items = document.querySelectorAll('.skill-item');
            return Array.from(items).map(item => ({
                name: item.querySelector('.item-name').value,
                level: parseInt(item.querySelector('.skill-level').value) || 0,
                category: item.querySelector('.skill-category').value,
                icon: item.querySelector('.skill-icon').value
            }));
        }

        function saveSkills() {
            fetch('/admin/save/skills', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(getSkillsData())
            }).then(r => r.json()).then(d => showNotification('Навыки сохранены'));
        }

        function addSkill() {
            const list = document.getElementById('skillsList');
            const idx = list.children.length;
            const html = `
                <div class="item-card skill-item" data-index="${idx}">
                    <div class="item-header">
                        <span class="item-icon">⚡</span>
                        <input type="text" class="item-name" value="New Skill">
                        <button class="btn-remove" onclick="this.closest('.skill-item').remove()">✕</button>
                    </div>
                    <div class="item-fields">
                        <div class="form-group">
                            <label>Уровень</label>
                            <input type="number" class="skill-level" value="50" min="0" max="100">
                        </div>
                        <div class="form-group">
                            <label>Категория</label>
                            <select class="skill-category">
                                <option value="frontend">Frontend</option>
                                <option value="backend">Backend</option>
                                <option value="database">Database</option>
                                <option value="devops">DevOps</option>
                                <option value="tools">Tools</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Иконка</label>
                            <input type="text" class="skill-icon" value="⚡">
                        </div>
                    </div>
                </div>`;
            list.insertAdjacentHTML('beforeend', html);
        }

        function removeSkill(idx) {
            document.querySelectorAll('.skill-item')[idx]?.remove();
        }

        // Projects
        function getProjectsData() {
            const items = document.querySelectorAll('.project-item');
            return Array.from(items).map((item, i) => ({
                id: i + 1,
                title: item.querySelector('.project-title').value,
                description: item.querySelector('.project-desc').value,
                tech: item.querySelector('.project-tech').value.split(',').map(s => s.trim()).filter(Boolean),
                features: item.querySelector('.project-features').value.split(',').map(s => s.trim()).filter(Boolean),
                demo_url: item.querySelector('.project-demo').value || '#',
                github_url: item.querySelector('.project-github').value || '#'
            }));
        }

        function saveProjects() {
            fetch('/admin/save/projects', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(getProjectsData())
            }).then(r => r.json()).then(d => showNotification('Проекты сохранены'));
        }

        function addProject() {
            const list = document.getElementById('projectsList');
            const idx = list.children.length + 1;
            const html = `
                <div class="item-card project-item" data-index="${idx}">
                    <div class="item-header">
                        <span class="item-number">#${idx}</span>
                        <input type="text" class="project-title" value="New Project">
                        <button class="btn-remove" onclick="this.closest('.project-item').remove()">✕</button>
                    </div>
                    <div class="item-fields">
                        <div class="form-group">
                            <label>Описание</label>
                            <textarea class="project-desc" rows="2"></textarea>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Технологии</label>
                                <input type="text" class="project-tech" value="">
                            </div>
                            <div class="form-group">
                                <label>Фичи</label>
                                <input type="text" class="project-features" value="">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Demo URL</label>
                                <input type="text" class="project-demo" value="#">
                            </div>
                            <div class="form-group">
                                <label>GitHub URL</label>
                                <input type="text" class="project-github" value="#">
                            </div>
                        </div>
                    </div>
                </div>`;
            list.insertAdjacentHTML('beforeend', html);
        }

        function removeProject(idx) {
            document.querySelectorAll('.project-item')[idx]?.remove();
        }

        // Experience
        function getExpData() {
            const items = document.querySelectorAll('.exp-item');
            return Array.from(items).map(item => ({
                position: item.querySelector('.exp-position').value,
                company: item.querySelector('.exp-company').value,
                period: item.querySelector('.exp-period').value,
                description: item.querySelector('.exp-desc').value
            }));
        }

        function saveExperience() {
            fetch('/admin/save/experience', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(getExpData())
            }).then(r => r.json()).then(d => showNotification('Опыт сохранён'));
        }

        function addExperience() {
            const list = document.getElementById('experienceList');
            const html = `
                <div class="item-card exp-item">
                    <div class="item-header">
                        <input type="text" class="exp-position" value="New Position">
                        <button class="btn-remove" onclick="this.closest('.exp-item').remove()">✕</button>
                    </div>
                    <div class="item-fields">
                        <div class="form-row">
                            <div class="form-group">
                                <label>Компания</label>
                                <input type="text" class="exp-company" value="">
                            </div>
                            <div class="form-group">
                                <label>Период</label>
                                <input type="text" class="exp-period" value="">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Описание</label>
                            <textarea class="exp-desc" rows="2"></textarea>
                        </div>
                    </div>
                </div>`;
            list.insertAdjacentHTML('beforeend', html);
        }

        function removeExperience(idx) {
            document.querySelectorAll('.exp-item')[idx]?.remove();
        }
    </script>
</body>
</html>
